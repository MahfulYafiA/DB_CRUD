<html>
<head>
    <title>File Input Example</title>
    <style>
        h1{
            text-align: center;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 400px;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Input Data</h1>
    <div class="container">
        <form id="form_mk" action="proses_inputmk.php" method="post">
            <fieldset>
                <legend>Input Data Mata Kuliah</legend>
                <p>
                    <label for="kode">Kode Mata Kuliah:</label>
                    <input type="text" name="kodeMK" id="kodeMK" required>
                </p>
                <p>
                    <label for="namaMK">Nama Mata Kuliah :</label>
                    <input type="text" name="namaMK" id="namaMK"  required>
                </p>
                <p>
                    <label for="sks">SKS :</label>
                    <input type="text" name="sks" id="sks" required>
                </p>
                <p>
                    <label for="jam">Jam  :</label>
                    <input type="time" name="jam" id="jam" required>
                </p>
                
            </fieldset>
            <p>
                <input type="submit" name="input" value="simpan">
                
            </p>

        </form>
    </div>
</body>
</html>
